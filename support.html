<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support ImageConv</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-width: 820px;
      width: 100%;
      overflow: hidden;
    }
    .banner {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 36px 40px 32px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .banner-icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
      backdrop-filter: blur(4px);
    }
    .banner-text h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .banner-text p { font-size: 14px; opacity: 0.85; line-height: 1.5; }
    .body { display: flex; gap: 0; }
    .col { flex: 1; padding: 32px 36px; }
    .col-left { border-right: 1px solid #eee; }
    .col h2 {
      font-size: 15px; font-weight: 600; color: #667eea;
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }
    .feature-list {
      list-style: none; display: flex; flex-direction: column; gap: 10px;
    }
    .feature-list li {
      font-size: 14px; line-height: 1.6; color: #444;
      padding-left: 22px; position: relative;
    }
    .feature-list li::before {
      content: ''; position: absolute; left: 0; top: 8px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #667eea; opacity: 0.5;
    }
    .thank-text { font-size: 14px; line-height: 1.8; color: #555; }
    .thank-text p + p { margin-top: 12px; }
    .thank-text .heart { color: #e74c3c; }
    .cta {
      text-align: center; padding: 28px 36px 36px;
      border-top: 1px solid #eee;
    }
    .cta p { font-size: 13px; color: #888; margin-bottom: 16px; }
    .support-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 36px; background: #667eea; color: #fff;
      font-size: 16px; font-weight: 600; text-decoration: none;
      border-radius: 10px; transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.35);
    }
    .support-btn:hover {
      background: #5a6fd6; transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    .support-btn:active { transform: translateY(0); }
    .footer {
      text-align: center; padding: 16px 36px 20px;
      font-size: 12px; color: #aaa;
    }
    .footer a { color: #667eea; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    @media (max-width: 640px) {
      body { padding: 12px; }
      .banner { padding: 24px 20px; flex-direction: column; text-align: center; }
      .body { flex-direction: column; }
      .col-left { border-right: none; border-bottom: 1px solid #eee; }
      .col { padding: 24px 20px; }
      .cta { padding: 24px 20px 28px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="banner">
      <div class="banner-icon">✨</div>
      <div class="banner-text">
        <h1>ImageConv</h1>
        <p data-i18n="tagline"></p>
      </div>
    </div>

    <div class="body">
      <div class="col col-left">
        <h2 data-i18n="featuresTitle"></h2>
        <ul class="feature-list" id="featureList"></ul>
      </div>
      <div class="col">
        <h2 data-i18n="thankTitle"></h2>
        <div class="thank-text" id="thankText"></div>
      </div>
    </div>

    <div class="cta">
      <p data-i18n="ctaHint"></p>
      <a class="support-btn" href="https://ko-fi.com/annmax?ref=imageconv" target="_blank" rel="noopener">
        <img src="./assets/coffee.png" alt="" width="28" height="22" style="vertical-align:middle;margin-right:6px"> <span data-i18n="btnText"></span>
      </a>
    </div>

    <div class="footer">
      <a href="https://github.com/annmax1983/ImageConv" target="_blank" rel="noopener">GitHub</a>
      &nbsp;·&nbsp;
      <a href="https://annmax1983.github.io/ImageConv/privacy-policy.html" target="_blank" rel="noopener" data-i18n="privacyPolicy">Privacy Policy</a>
      &nbsp;·&nbsp; Copyright © 2026 ImageConv
    </div>
  </div>

          'Right-click any image → Save as or Copy as your preferred format',
          'Drag & drop local files for batch conversion',
          'Smart link cleaning to fetch original quality images',
          'Adjustable export quality with sliders for JPG/WEBP/AVIF',

        ],
        thankTitle: '💌 A Note to You',
        thank: [

          'Of course, if you\'d like to <span class="heart">☕</span> buy me a coffee, it would truly make my day — and keep me motivated to make ImageConv even better.'
        ],

        tagline: 'ブラウザ内で画像フォーマット変換 · PNG/JPG/WEBP/AVIF · プライバシー重視',
        featuresTitle: '✨ 機能紹介',

        privacyPolicy: 'プライバシーポリシー'
      },
      de: {
        tagline: 'Lokale Bildformat-Konvertierung im Browser · PNG/JPG/WEBP/AVIF · Datenschutz',
        featuresTitle: '✨ Funktionen',
        features: [
          'Bilder zwischen PNG, JPG, WEBP und AVIF im Browser konvertieren',
          'Rechtsklick auf ein Bild → Speichern oder Kopieren im gewünschten Format',
          'Lokale Dateien per Drag & Drop für Stapelkonvertierung',

        ],

          'Vielen Dank, dass Sie ImageConv nutzen. Ich habe dieses Tool gebaut, weil ich genug hatte von Online-Konvertern, die Dateien hochladen, ewig warten und meine Vollständig Privat gefährden.',
          'Wenn es auch Ihnen hilft, ist das die beste Belohnung, die ich mir wünschen kann.',
          'Wenn Sie mir gerne einen <span class="heart">☕</span> Kaffee ausgeben möchten, würde mich das sehr freuen — und mich motivieren, ImageConv noch besser zu machen.'
        ],
        ctaHint: 'Klicken Sie auf die Schaltfläche unten, um zur Support-Seite zu gelangen',

      es: {
        tagline: 'Conversión local de formatos de imagen en tu navegador · PNG/JPG/WEBP/AVIF · Privacidad',
        featuresTitle: '✨ Características',
        features: [
          'Convierte imágenes entre PNG, JPG, WEBP y AVIF en tu navegador',
          'Clic derecho en cualquier imagen → Guardar o Copiar en tu formato preferido',
          'Arrastra y suelta archivos locales para conversión por lotes',
          'Limpieza inteligente de enlaces para obtener la calidad original',
          'Calidad de exportación ajustable con controles deslizantes para JPG/WEBP/AVIF',
          'Procesamiento Fully Local — tus imágenes nunca salen de tu navegador'
        ],
        thankTitle: '💌 Unas palabras para ti',
        thank: [
          'Gracias por usar ImageConv. Construí esta herramienta porque estaba harto de los conversores en línea que requieren subir archivos, esperar mucho tiempo y arriesgar mi privacidad.',
          'Si también te ayuda a ti, esa ya es la mejor recompensa que puedo pedir.',
          'Por supuesto, si quieres invitarme a un <span class="heart">☕</span> café, me haría muy feliz — y me motivaría a seguir mejorando ImageConv.'
        ],
        ctaHint: 'Haz clic en el botón de abajo para visitar la página de soporte',
        btnText: 'Support My Work',
        privacyPolicy: 'Política de Privacidad'
      },
      fr: {
        tagline: 'Conversion locale de formats d\'image dans votre navigateur · PNG/JPG/WEBP/AVIF · Confidentialité',
        featuresTitle: '✨ Fonctionnalités',
        features: [
          'Convertissez des images entre PNG, JPG, WEBP et AVIF dans votre navigateur',
          'Clic droit sur une image → Enregistrer ou Copier dans votre format préféré',
          'Glissez-déposez des fichiers locaux pour la conversion par lots',
          'Nettoyage intelligent des liens pour obtenir la qualité originale',
          'Qualité d\'exportation ajustable avec des curseurs pour JPG/WEBP/AVIF',
          'Traitement Fully Local — vos images ne quittent jamais votre navigateur'
        ],
        thankTitle: '💌 Un petit mot pour vous',
        thank: [
          'Merci d\'utiliser ImageConv. J\'ai construit cet outil parce que j\'en avais assez des convertisseurs en ligne qui nécessitent de télécharger des fichiers, d\'attendre longtemps et de risquer ma vie privée.',
          'S\'il vous aide aussi, c\'est déjà la plus belle récompense.',
          'Bien sûr, si vous souhaitez m\'offrir un <span class="heart">☕</span> café, cela me ferait très plaisir — et me motiverait à améliorer ImageConv encore davantage.'
        ],
        ctaHint: 'Cliquez sur le bouton ci-dessous pour accéder à la page de soutien',
        btnText: 'Support My Work',
        privacyPolicy: 'Politique de Confidentialité'
      }
    };

    function detectLang() {
      const code = (navigator.language || 'en').split('-')[0].toLowerCase();
      return I18N[code] ? code : 'en';
    }

    function applyLang(lang) {
      const t = I18N[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) {
          if (key === 'thank') return;
          el.textContent = t[key];
        }
      });
      const list = document.getElementById('featureList');
      list.innerHTML = t.features.map(f => `<li>${f}</li>`).join('');
      const thankDiv = document.getElementById('thankText');
      thankDiv.innerHTML = t.thank.map(p => `<p>${p}</p>`).join('');
      document.documentElement.lang = lang;
    }

    applyLang(detectLang());
  </script>
</body>
</html>
